<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🎂 Birthday Message Generator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI';
}

.card {
    border-radius: 20px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.02);
}

button {
    border-radius: 25px !important;
    background: linear-gradient(45deg,#ff758c,#ff7eb3) !important;
    border: none !important;
}

button:hover {
    transform: scale(1.05);
}

#result {
    display: none;
    animation: fade 0.5s ease-in-out;
}

@keyframes fade {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: red;
    top: 0;
    animation: fall 3s linear infinite;
}

@keyframes fall {
    to {transform: translateY(100vh) rotate(360deg);}
}
</style>

</head>
<body>

<div class="container text-center">
<div class="card p-4 shadow">

<h2>🎉 Birthday Generator 🎉</h2>

<input type="date" id="birthday" class="form-control my-3">

<select id="type" class="form-select mb-3">
<option value="nice">Nice 😊</option>
<option value="funny">Funny 😜</option>
</select>

<button class="btn btn-primary w-100" onclick="generateMessage()">Generate</button>

<div id="result" class="alert alert-success mt-3"></div>
<div id="countdown" class="mt-2 text-dark"></div>

</div>
</div>

<audio id="sound" src="https://www.soundjay.com/human/applause-8.mp3"></audio>

<script>
function generateMessage(){
    let date = document.getElementById("birthday").value;
    let type = document.getElementById("type").value;

    if(!date){
        alert("Please select a date!");
        return;
    }

    let today = new Date();
    let bday = new Date(date);

    let diff = bday - today;
    let days = Math.ceil(diff / (1000*60*60*24));

    let message = "";

    if(type === "nice"){
        message = "🎂 Wishing you happiness and success always!";
    } else {
        message = "😜 You’re not old… just more experienced!";
    }

    document.getElementById("result").style.display = "block";
    document.getElementById("result").innerHTML = message;

    document.getElementById("countdown").innerHTML =
        "⏳ Days left: " + days;

    // Play sound
    document.getElementById("sound").play();

    // Confetti
    for(let i=0;i<30;i++){
        let confetti = document.createElement("div");
        confetti.classList.add("confetti");
        confetti.style.left = Math.random()*100 + "vw";
        confetti.style.background = 
            ["red","yellow","blue","green"][Math.floor(Math.random()*4)];
        document.body.appendChild(confetti);

        setTimeout(()=>confetti.remove(),3000);
    }
}
</script>

</body>
</html>
